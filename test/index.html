<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <!-- <script src="webedge-component.js"></script> -->
   <!-- <script src="./dist/webcomp.js" type="module"></script> -->
  <!-- <script src="mt-button.js"></script> -->
  <style>
  .material-symbols-rounded {
    font-variation-settings:
    'FILL' 0,
    'wght' 400,
    'GRAD' 0,
    'opsz' 24
  }
  .roboto-normal {
    font-family: "Roboto", sans-serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: normal;
    font-variation-settings:
      "wdth" 100;
  }
  body {
    padding: 20px;
  }
  </style>

  <style>
    :root {
      --mat-1dp: 1px;
      --mt-textfield-height: 56px;
    }
    mt-textfield {
      display: inline-block;
      padding: 8px;
    }
    .mt-textfield--container {
      display: inline-flex;
      flex-direction: column;
    }
    .mt-textfield--outline {
      position: relative;
      height: var(--mt-textfield-height);
      display: flex;
      align-items: center;
      padding: 0px 16px;
      gap: 16px;
    }
    .mt-textfield--outline.leading-icon {
      padding-left: 12px;
    }
    .mt-textfield--outline.trailing-icon {
      padding-right: 12px;
    }
    .mt-textfield--outline:focus-within {
      border-width: 3px;
    }
    .mt-textfield--input {
      border: none;
      outline: none;
      z-index: 2;
      background: none;
    }
    .mt-textfield--outline-border {
      position: absolute;
      inset: 0;
      border: 1px solid #79747E;
      border-radius: 4px;
      z-index: -1;
      transition: border-color ease-in-out .1s, border-width ease-in-out .1s;
    }
    .mt-textfield--outline:focus-within > .mt-textfield--outline-border {
      border-width: 3px;
      border-radius: 4px;
      border-color: #6750A4;
    }
    .mt-textfield--leading-icon, .mt-textfield--trailing-icon {
      width: 24px;
      height: 24px;
      user-select: none;
      overflow: hidden;
    }
    .mt-textfield--trailing-icon {
      cursor: pointer;
    }
    .mt-textfield--input, .mt-textfield--label-text {
      font-size: 16px;
      min-width: 25px;
      font-family: Roboto;
    }
    .mt-textfield--leading-icon, .mt-textfield--trailing-icon, .mt-textfield--input, .mt-textfield--label-text {
      color: #49454F;
    }
    .mt-textfield--label-text {
      display: inline-block;
      background-color: white;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1;
      transition: font-size ease-in-out .2s, top ease-in-out .2s, left ease-in-out .2s, color ease-in-out .2s;
    }
    .mt-textfield--outline.leading-icon > .mt-textfield--label-text {
      left: 52px;
    }
    .mt-textfield--outline:focus-within > .mt-textfield--label-text {
      color: #6750A4;
    }
    .mt-textfield--outline.with-content > .mt-textfield--label-text, .mt-textfield--outline:focus-within > .mt-textfield--label-text {
      top: 0px;
      padding-left: 4px;
      padding-right: 4px;
      left: 12px;
      font-size: 12px;
    }
  </style>
  
</head>
<body class="roboto-normal">
  <div class="mt-textfield--container" id="mt-textfield">
    <div class="mt-textfield--outline leading-icon trailing-icon">
      <div class="mt-textfield--outline-border"></div>
      <div class="mt-textfield--leading-icon material-symbols-rounded">search</div>
      <label class="mt-textfield--label-text">First Name</label>
      <input type="text" class="mt-textfield--input">
      <div class="mt-textfield--trailing-icon material-symbols-rounded">cancel</div>
    </div>
  </div>

  <sample-component componentLabel="Sample component label"></sample-component>

  <mt-textfield label="Last name" value="Gavino" leadingicon="search" trailingicon="cancel"></mt-textfield>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const mtTextfield = document.getElementById("mt-textfield");
      const mtTextFieldInput = mtTextfield.querySelector(".mt-textfield--input");

      mtTextFieldInput.addEventListener("blur", (event) => {
        const target = event.target;
        if (target.value === "")
          target.parentElement.classList.remove("with-content");
        else
          target.parentElement.classList.add("with-content");
      });
    });
  </script>

  <script type="module">
    import { WebComponent } from "../minified/webcomp.min.js";

    const materialTextField = new WebComponent("sample-component", (template, styles, lib) => {
      const { div, input, label, button } = lib.dom;
      const { state, property, callback } = lib.component;
      
      const isError = state("isError", false, {
        on: "color-red",
        off: "color-blue"
      });

      template(
        div({ className: "container" },
          label({ className: "title" }, "Hello World"),
          input({ type: "text", value: property("componentlabel") }),

          label({ className: ["inline-block", isError] }, property("componentLabel")),
          input({ type: "button", value: "Continue", display: state("showContinueButton") }),

          button({ className: property("buttonclassname"), onclick: callback("buttonClickCallback") }, "Click Me!")
        )
      );

      styles({
        ".container": {
          border: "1px solid black",
          display: "inline-block"
        }
      });
    });

    materialTextField.setPropertyValue("componentLabel", "Component Label");
    materialTextField.setPropertyValue("buttonclassname", "sample-classname");

    materialTextField.setCallbackValue("buttonClickCallback", function() {
      console.log(this.stateMap.get("isError").set(true));
      this.setStateOn("showContinueButton");
    });
    
    materialTextField.setStateOn("showContinueButton");
    materialTextField.register();
  </script>
</body>
</html>
